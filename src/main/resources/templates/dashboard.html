<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Finance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

    <h1>Finance Tracker</h1>

    <!-- Summary Cards -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h5 class="card-title">Income</h5>
                    <h3 th:text="'$' + ${totalIncome}">$0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-danger">
                <div class="card-body">
                    <h5 class="card-title">Expenses</h5>
                    <h3 th:text="'$' + ${totalExpenses}">$0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <h5 class="card-title">Balance</h5>
                    <h3 th:text="'$' + ${balance}">$0</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <form method="get" action="/" class="row mb-4">
        <div class="col-md-3">
            <label class="form-label">Type</label>
            <select name="type" class="form-select">
                <option value="">All</option>
                <option value="INCOME" th:selected="${selectedType == 'INCOME'}">Income</option>
                <option value="EXPENSE" th:selected="${selectedType == 'EXPENSE'}">Expense</option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">Category</label>
            <select name="category" class="form-select">
                <option value="">All</option>
                <option value="Salary" th:selected="${selectedCategory == 'Salary'}">Salary</option>
                <option value="Food" th:selected="${selectedCategory == 'Food'}">Food</option>
                <option value="Transport" th:selected="${selectedCategory == 'Transport'}">Transport</option>
                <option value="Entertainment" th:selected="${selectedCategory == 'Entertainment'}">Entertainment</option>
                <option value="Bills" th:selected="${selectedCategory == 'Bills'}">Bills</option>
                <option value="Other" th:selected="${selectedCategory == 'Other'}">Other</option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label">From</label>
            <input type="date" name="startDate" class="form-control" th:value="${startDate}">
        </div>
        <div class="col-md-2">
            <label class="form-label">To</label>
            <input type="date" name="endDate" class="form-control" th:value="${endDate}">
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-outline-primary me-2">Filter</button>
            <a href="/" class="btn btn-outline-secondary">Clear</a>
        </div>
    </form>

    <!-- Add Button -->
    <a href="/add" class="btn btn-primary mb-3">Add Transaction</a>

    <!-- Transactions Table -->
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Category</th>
            <th>Description</th>
            <th>Amount</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${transactions}">
            <td th:text="${t.date}">2026-03-23</td>
            <td th:text="${t.type}">EXPENSE</td>
            <td th:text="${t.category}">Food</td>
            <td th:text="${t.description}">Lunch</td>
            <td th:text="${t.amount}">-50.00</td>
            <td>
                <a th:href="@{/delete/{id}(id=${t.id})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Are you sure?')">Delete</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(transactions)}">
            <td colspan="6" class="text-center">No transactions yet</td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
